name: Publish Conda Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build And Test Conda Package
    runs-on: ubuntu-latest

    env:
      CHANNEL: micknudsen

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          activate-environment: skua-build
          environment-file: environment.yml
          channels: conda-forge,bioconda,defaults
          channel-priority: strict
          use-mamba: true

      - name: Build package
        shell: bash -l {0}
        run: |
          conda build conda-recipe/

      - name: Locate built package
        id: locate
        shell: bash -l {0}
        run: |
          PKG_PATH="$(conda build conda-recipe/ --output)"
          echo "pkg_path=${PKG_PATH}" >> "$GITHUB_OUTPUT"

      - name: Smoke test package install
        shell: bash -l {0}
        run: |
          CONDA_BLD_DIR="$(conda info --base)/conda-bld"
           conda index "${CONDA_BLD_DIR}"
          conda create -y -n skua-smoke -c "file://${CONDA_BLD_DIR}" -c conda-forge -c bioconda python=3.12 skua
          conda run -n skua-smoke skua annotate --help

      - name: Upload conda artifact
        uses: actions/upload-artifact@v4
        with:
          name: conda-package
          path: ${{ steps.locate.outputs.pkg_path }}

  publish-conda:
    name: Publish To Anaconda Channel
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: build-and-test

    env:
      CHANNEL: micknudsen

    environment:
      name: conda
      url: https://anaconda.org/micknudsen/skua

    steps:
      - name: Download conda artifact
        uses: actions/download-artifact@v4
        with:
          name: conda-package
          path: dist

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          activate-environment: skua-publish
          python-version: "3.12"

      - name: Install upload tooling
        shell: bash -l {0}
        run: |
          conda install -y -c defaults anaconda-client

      - name: Publish package to micknudsen channel
        shell: bash -l {0}
        env:
          ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_API_TOKEN }}
        run: |
          PKG_PATH=$(find dist -type f \( -name "*.conda" -o -name "*.tar.bz2" \) | head -n 1)
          if [ -z "$PKG_PATH" ]; then
            echo "No conda package found to upload"
            exit 1
          fi
          anaconda -t "$ANACONDA_API_TOKEN" upload --user "$CHANNEL" "$PKG_PATH"